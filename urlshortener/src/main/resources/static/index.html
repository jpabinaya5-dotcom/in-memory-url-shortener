<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🔗 URL Shortener</h1>

    <input type="text" id="longURL" placeholder="Enter Long URL">
    <button onclick="shortenURL()">Shorten URL</button>

    <p id="shortResult"></p>

    <hr>

    <input type="text" id="code" placeholder="Enter Short Code">
    <button onclick="resolveURL()">Resolve URL</button>

    <p id="resolveResult"></p>

</div>

<script src="script.js"></script>

</body>
</html>
