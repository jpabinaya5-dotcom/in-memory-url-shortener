<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
   <div class ="logo">
    <img src ="logo.png" alt="URL Shortener Logo">
    <h1>URL Shortener</h1>
   </div>

    <input type="text" id="longURL" placeholder="Enter Long URL">
    <button onclick="shortenURL()">Shorten URL</button>

    <p id="shortResult"></p>

    <hr>

    <input type="text" id="code" placeholder="Enter Short Code">
    <button onclick="resolveURL()">Resolve URL</button>

    <p id="resolveResult"></p>

</div>
<footer>
    Created by Abinaya
</footer>

<script src="script.js"></script>

</body>
</html>
